  save_video: true
  events_csv: output/events.csv
  peak_csv: output/peak_hourly.csv
  heatmap_image: output/heatmap.png
  show_window: true
display:
  show_boxes: true
  show_labels: true
  show_zones: true
  jpeg_quality: 80
  stream_fps: 25
  heatmap_refresh_sec: 5
logic:
  cashier_min_dwell_sec: 4
  cashier_max_dwell_sec: 300
  seat_min_dwell_sec: 30
  seat_move_eps_px: 12
  zone_exit_grace_sec: 1.5
  seat_memory_sec: 30
  seat_memory_px: 120
  min_box_area_px: 0
  line_anchor: center
  line_crossing_frames: 1
  auto_seat_from_chair: false
  auto_seat_ttl_sec: 3.0
  auto_seat_grow_up: 0.6
  auto_seat_ema: 0.6
  auto_seat_iou: 0.25
  open_hours: ''
  max_capacity: 0
  queue_alert_count: 3
  snapshot_on_event: true
  snapshot_events:
  - transaction
  - enter
  snapshot_retain_days: 7
  db_retain_days: 0
  heatmap_decay: 0.0
  heatmap_gamma: 0.5
  heatmap_blur: 15
