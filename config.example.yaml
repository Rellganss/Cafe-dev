# Template config. Copy ke config.yaml lalu isi RTSP kamera lu:
#   cp config.example.yaml config.yaml
# config.yaml di-gitignore (berisi password) - JANGAN di-commit.
source:
  # Ganti user/pass/ip kamera. Hikvision: /Streaming/Channels/101 (main) atau 102 (sub).
  rtsp: rtsp://USER:PASSWORD@CAMERA_IP:554/Streaming/Channels/101
  file: sample.mp4
model:
  weights: yolov8s.pt    # GTX1650 4GB. Naik yolov8m kalau GPU lebih kuat.
  conf: 0.4
  iou: 0.5
  imgsz: 512             # 640 lebih akurat, 512/480 lebih cepat
  device: 0              # 0=GPU NVIDIA, "cpu"=CPU
  classes:
  - 0                    # 0 = person (COCO)
tracker:
  track_activation_threshold: 0.25
  lost_track_buffer: 60
  minimum_matching_threshold: 0.8
  frame_rate: 15
processing:
  frame_skip: 1
  resize_width: 1280
output:
  annotated_video: output/annotated.mp4
  save_video: true
  events_csv: output/events.csv
  peak_csv: output/peak_hourly.csv
  heatmap_image: output/heatmap.png
  show_window: true
logic:
  cashier_min_dwell_sec: 4
  cashier_max_dwell_sec: 300
  seat_min_dwell_sec: 30
  seat_move_eps_px: 12
  zone_exit_grace_sec: 1.5
  min_box_area_px: 1200
  line_anchor: bottom_center   # titik bbox yg dicek nyebrang garis. RTSP top-down: bottom_center (kaki). webcam close-up (kaki ke-crop): center
  line_crossing_frames: 1      # frame berturut di sisi seberang biar kehitung. 1=paling responsif, naikin kalau bbox goyang/jitter
  heatmap_decay: 0.0
  heatmap_gamma: 0.5
# Gambar pakai: python setup_zones.py  (r=ROI, l=garis, p=kasir, s=kursi)
detect_roi: []
lines: []
zones: []
